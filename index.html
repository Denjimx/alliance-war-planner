<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alliance War Planner v3.0.1 by DenjiMX</title>
<style>
:root{--bg:#090909;--panel:#111;--card:#181818;--line:#303030;--text:#f7f7f7;--muted:#a8a8a8;--purple:#a855f7;--purple2:#c084fc;--gold:#e8b64c;--header:88px}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif;overflow:hidden}
button,.fileBtn{font:inherit}
header{height:var(--header);background:#101010;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:10px 18px;gap:14px;box-shadow:0 5px 20px #0008;position:relative;z-index:10}
.logo{width:120px;height:62px;object-fit:contain}.brand{min-width:310px;margin-right:auto}.brand h1{font-size:25px;margin:0 0 4px;letter-spacing:.2px}.brand .sub{color:var(--purple2);font-weight:800;font-size:14px}.brand .version{color:var(--muted);font-weight:600}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.btn,.fileBtn{height:42px;background:#202020;color:#fff;border:1px solid #444;border-radius:10px;padding:0 13px;cursor:pointer;font-weight:750;display:inline-flex;align-items:center;gap:7px;transition:.15s ease;white-space:nowrap}.btn:hover,.fileBtn:hover{background:#2a1838;border-color:var(--purple);box-shadow:0 0 0 2px #a855f722;color:#fff;transform:translateY(-1px)}.btn.gold:hover{border-color:var(--gold);background:#352b15}.btn.danger:hover{border-color:#ef4444;background:#321719}.btn:active,.fileBtn:active{transform:translateY(0)}
.app{height:calc(100vh - var(--header));display:grid;grid-template-columns:430px minmax(0,1fr);gap:12px;padding:12px}
aside{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:14px;display:flex;flex-direction:column;min-height:0;box-shadow:0 12px 30px #0007}aside h2{margin:0;font-size:21px}.search{width:100%;background:#181818;color:#fff;border:1px solid #444;border-radius:10px;padding:12px;margin:10px 0;outline:none}.search:focus{border-color:var(--purple);box-shadow:0 0 0 3px #a855f722}.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px}.filter{background:#202020;color:#eee;border:1px solid #414141;border-radius:8px;padding:7px 9px;font-size:12px;font-weight:800;cursor:pointer;transition:.15s}.filter:hover{border-color:var(--purple);background:#2a1838}.filter.active{background:var(--purple);border-color:var(--purple);color:#fff;box-shadow:0 0 12px #a855f755}.hint{font-size:12px;color:var(--muted);margin:0 0 7px;line-height:1.35}#status{font-size:12px;color:var(--gold);margin-bottom:5px;font-weight:700}
#gallery{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));grid-auto-rows:max-content;align-content:start;gap:9px;padding:5px 5px 14px 0;scrollbar-gutter:stable}.card{background:var(--card);border:1px solid #3b3b3b;border-radius:10px;overflow:hidden;cursor:grab;position:relative;min-width:0;transition:.15s;box-shadow:0 4px 10px #0005}.card:hover{border-color:var(--purple);box-shadow:0 0 0 2px #a855f733,0 8px 16px #0009;transform:translateY(-2px)}.card:active{cursor:grabbing}.card img{display:block;width:100%;height:auto;aspect-ratio:720/500;object-fit:contain;background:#080808}.card span{display:block;padding:7px 6px;font-size:11px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
.workspace{background:#000;border:1px solid var(--line);border-radius:15px;overflow:hidden;position:relative;box-shadow:0 12px 30px #0007}.viewport{position:absolute;inset:0;overflow:hidden;background:#000;cursor:default}.viewport.panning{cursor:grabbing}.stage{position:absolute;width:997px;height:1577px;background:#000;transform-origin:0 0;box-shadow:0 0 0 1px #222,0 20px 60px #000}.stage>img{display:block;width:100%;height:100%;object-fit:contain;pointer-events:none;user-select:none}
.placed-item{position:absolute;width:112px;height:78px;cursor:move;user-select:none;touch-action:none;z-index:2}.placed-item img{display:block;width:100%;height:100%;object-fit:cover;border:3px solid var(--purple);border-radius:10px;box-shadow:0 5px 15px #000;pointer-events:none}.placed-item.selected img{outline:2px solid #fff;box-shadow:0 0 0 4px #a855f744,0 8px 18px #000}.resize-handle{position:absolute;width:20px;height:20px;right:-9px;bottom:-9px;border-radius:50%;background:#fff;border:4px solid var(--purple);cursor:nwse-resize;display:none;z-index:4;box-shadow:0 2px 8px #000}.placed-item.selected .resize-handle{display:block}.name-tag{position:absolute;left:50%;bottom:-25px;transform:translateX(-50%);background:#111e;color:#fff;border:1px solid #555;border-radius:6px;padding:3px 6px;font-size:10px;font-weight:800;white-space:nowrap;display:none;pointer-events:none}.placed-item.selected .name-tag{display:block}
.zoomBar{position:absolute;left:14px;bottom:14px;z-index:5;display:flex;align-items:center;gap:7px;background:#121212e8;border:1px solid #444;border-radius:11px;padding:7px;box-shadow:0 5px 16px #000}.zoomBar button{width:34px;height:32px;border:1px solid #444;background:#222;color:#fff;border-radius:8px;font-size:18px;cursor:pointer}.zoomBar button:hover{border-color:var(--purple);background:#2a1838}.zoomBar span{min-width:52px;text-align:center;font-size:12px;font-weight:800}.watermark{position:absolute;right:16px;bottom:16px;z-index:5;text-align:right;color:#bbb;font-size:11px;pointer-events:none;text-shadow:0 2px 4px #000}.watermark b{color:var(--purple2);font-size:13px}
.toast{position:fixed;left:50%;top:104px;transform:translate(-50%,-20px);opacity:0;pointer-events:none;background:#171717;border:1px solid var(--purple);border-radius:10px;padding:10px 16px;font-weight:800;z-index:50;transition:.2s;box-shadow:0 8px 26px #000}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:1250px){.app{grid-template-columns:370px minmax(0,1fr)}#gallery{grid-template-columns:repeat(2,minmax(0,1fr))}.brand h1{font-size:21px}.btn,.fileBtn{padding:0 10px;font-size:13px}}
@media(max-width:900px){body{overflow:auto}header{height:auto;min-height:88px;flex-wrap:wrap}.toolbar{width:100%;justify-content:flex-start}.app{height:calc(100vh - 150px);grid-template-columns:330px minmax(600px,1fr);overflow:auto}}
</style>
</head>
<body>
<header>
<img class="logo" src="assets/logo.png" alt="Logo MCOC">
<div class="brand"><h1>Alliance War Planner</h1><div class="sub">by DenjiMX <span class="version">· v3.0.1</span></div></div>
<div class="toolbar">
<button class="btn" id="saveLocal">💾 Guardar</button>

</div>
</header>
<div class="app">
<aside>

<input id="search" class="search" placeholder="Buscar campeón por nombre...">

</aside>
<main class="workspace">

<div class="zoomBar"><button id="zoomOut" title="Alejar">−</button><span id="zoomLabel">50%</span><button id="zoomIn" title="Acercar">+</button><button id="fit" title="Ajustar mapa">⌂</button></div>
<div class="watermark"><b>Alliance War Planner</b><br>by DenjiMX · v3.0.1</div>
</main>
</div>
<div id="toast" class="toast"></div>

const stage=document.getElementById('stage'), viewport=document.getElementById('viewport'), gallery=document.getElementById('gallery'), search=document.getElementById('search');
let filter='all', placed=[], selected=null, topZ=2, scale=.5, panX=0, panY=0;
const labels={all:'Todos',cosmic:'Cósmico',science:'Científico',mutant:'Mutante',mystic:'Místico',skill:'Hábil',tech:'Tecnológico'};
function norm(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase()}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove('show'),1800)}
function renderFilters(){const f=document.getElementById('filters');f.innerHTML='';Object.entries(labels).forEach(([k,v])=>{const b=document.createElement('button');b.className='filter'+(filter===k?' active':'');b.textContent=v;b.addEventListener('click',()=>{filter=k;renderFilters();renderGallery()});f.appendChild(b)})}
function renderGallery(){const q=norm(search.value.trim());const list=champions.filter(c=>(filter==='all'||c.class===filter)&&(!q||norm(c.name).includes(q)));gallery.innerHTML='';list.forEach(c=>{const d=document.createElement('div');d.className='card';d.draggable=true;d.title=c.name;d.innerHTML=`<img src="${c.image}" alt="${c.name}" loading="lazy"><span>${c.name}</span>`;d.querySelector('img').addEventListener('error',ev=>{ev.currentTarget.style.objectFit='contain';ev.currentTarget.alt=c.name;});d.addEventListener('dragstart',e=>{e.dataTransfer.effectAllowed='copy';e.dataTransfer.setData('application/json',JSON.stringify(c));e.dataTransfer.setData('text/plain',JSON.stringify(c))});gallery.appendChild(d)});document.getElementById('status').textContent=`${list.length} de ${champions.length} campeones`}
search.addEventListener('input',renderGallery);
function applyTransform(){stage.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;document.getElementById('zoomLabel').textContent=Math.round(scale*100)+'%'}
function fitStage(){const vw=viewport.clientWidth,vh=viewport.clientHeight;scale=Math.min((vw-50)/997,(vh-50)/1577,1);panX=(vw-997*scale)/2;panY=(vh-1577*scale)/2;applyTransform()}
function clientToStage(clientX,clientY){const r=viewport.getBoundingClientRect();return{x:(clientX-r.left-panX)/scale,y:(clientY-r.top-panY)/scale}}
function zoomAt(next,cx=viewport.clientWidth/2,cy=viewport.clientHeight/2){next=Math.max(.2,Math.min(1.8,next));const sx=(cx-panX)/scale,sy=(cy-panY)/scale;panX=cx-sx*next;panY=cy-sy*next;scale=next;applyTransform()}
viewport.addEventListener('wheel',e=>{e.preventDefault();const r=viewport.getBoundingClientRect();zoomAt(scale*(e.deltaY<0?1.1:.9),e.clientX-r.left,e.clientY-r.top)},{passive:false});
let panning=false,panStart=null;viewport.addEventListener('pointerdown',e=>{if(e.button===1||e.button===2||e.target===viewport){if(e.target.closest('.placed-item'))return;panning=true;viewport.classList.add('panning');panStart={x:e.clientX,y:e.clientY,px:panX,py:panY};viewport.setPointerCapture(e.pointerId);e.preventDefault()}});viewport.addEventListener('pointermove',e=>{if(!panning)return;panX=panStart.px+e.clientX-panStart.x;panY=panStart.py+e.clientY-panStart.y;applyTransform()});viewport.addEventListener('pointerup',()=>{panning=false;viewport.classList.remove('panning')});viewport.addEventListener('contextmenu',e=>e.preventDefault());
document.getElementById('zoomIn').onclick=()=>zoomAt(scale*1.15);document.getElementById('zoomOut').onclick=()=>zoomAt(scale*.85);document.getElementById('fit').onclick=fitStage;
stage.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy'});stage.addEventListener('drop',e=>{e.preventDefault();let c;try{c=JSON.parse(e.dataTransfer.getData('application/json')||e.dataTransfer.getData('text/plain'))}catch{return}const p=clientToStage(e.clientX,e.clientY);addPlaced(c,p.x-56,p.y-39)});
function addPlaced(c,x,y,w=112,h=78){x=Math.max(0,Math.min(997-w,x));y=Math.max(0,Math.min(1577-h,y));const el=document.createElement('div');el.className='placed-item';el.style.left=x+'px';el.style.top=y+'px';el.style.width=w+'px';el.style.height=h+'px';el.style.zIndex=++topZ;el.innerHTML=`<img src="${c.image}" alt="${c.name}" title="${c.name}"><span class="name-tag">${c.name}</span><span class="resize-handle" title="Cambiar tamaño"></span>`;stage.appendChild(el);const obj={name:c.name,class:c.class,image:c.image,x,y,w,h,el};placed.push(obj);wire(obj);select(obj);return obj}
function wire(o){const handle=o.el.querySelector('.resize-handle');o.el.addEventListener('pointerdown',e=>{if(e.target===handle)return;e.preventDefault();e.stopPropagation();select(o);o.el.setPointerCapture(e.pointerId);const sx=e.clientX,sy=e.clientY,ox=o.x,oy=o.y;const move=ev=>{o.x=Math.max(0,Math.min(997-o.w,ox+(ev.clientX-sx)/scale));o.y=Math.max(0,Math.min(1577-o.h,oy+(ev.clientY-sy)/scale));o.el.style.left=o.x+'px';o.el.style.top=o.y+'px'};const up=()=>{o.el.removeEventListener('pointermove',move);o.el.removeEventListener('pointerup',up);o.el.removeEventListener('pointercancel',up)};o.el.addEventListener('pointermove',move);o.el.addEventListener('pointerup',up);o.el.addEventListener('pointercancel',up)});handle.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();select(o);handle.setPointerCapture(e.pointerId);const sx=e.clientX,startW=o.w,ratio=o.h/o.w;const move=ev=>{let w=Math.max(42,Math.min(360,startW+(ev.clientX-sx)/scale));w=Math.min(w,997-o.x);let h=w*ratio;if(h>1577-o.y){h=1577-o.y;w=h/ratio}o.w=w;o.h=h;o.el.style.width=w+'px';o.el.style.height=h+'px'};const up=()=>{handle.removeEventListener('pointermove',move);handle.removeEventListener('pointerup',up);handle.removeEventListener('pointercancel',up)};handle.addEventListener('pointermove',move);handle.addEventListener('pointerup',up);handle.addEventListener('pointercancel',up)})}
function select(o){if(selected)selected.el.classList.remove('selected');selected=o;o.el.classList.add('selected');o.el.style.zIndex=++topZ}
document.addEventListener('pointerdown',e=>{if(!e.target.closest('.placed-item')&&!e.target.closest('.card')){if(selected)selected.el.classList.remove('selected');selected=null}});
document.addEventListener('keydown',e=>{if((e.key==='Delete'||e.key==='Backspace')&&selected&&document.activeElement!==search){selected.el.remove();placed=placed.filter(x=>x!==selected);selected=null}});
function snapshot(){return{app:'Alliance War Planner',version:'3.0.1',savedAt:new Date().toISOString(),view:{scale,panX,panY},items:placed.map(o=>({name:o.name,class:o.class,image:o.image,x:o.x,y:o.y,w:o.w,h:o.h}))}}
function loadProject(data){if(Array.isArray(data))data={items:data};if(!data||!Array.isArray(data.items))throw new Error('Formato inválido');placed.forEach(x=>x.el.remove());placed=[];selected=null;data.items.forEach(o=>addPlaced(o,o.x,o.y,o.w,o.h));if(data.view){scale=data.view.scale||scale;panX=Number.isFinite(data.view.panX)?data.view.panX:panX;panY=Number.isFinite(data.view.panY)?data.view.panY:panY;applyTransform()}toast('Proyecto cargado')}
function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
document.getElementById('saveLocal').onclick=()=>{localStorage.setItem('awPlannerDenjiMX_v3',JSON.stringify(snapshot()));toast('Proyecto guardado en este navegador')};
document.getElementById('recoverLocal').onclick=()=>{const raw=localStorage.getItem('awPlannerDenjiMX_v3');if(!raw)return toast('No hay proyecto guardado');try{loadProject(JSON.parse(raw))}catch{toast('No se pudo recuperar')}};
document.getElementById('downloadProject').onclick=()=>download(new Blob([JSON.stringify(snapshot(),null,2)],{type:'application/json'}),'Alliance_War_Planner_DenjiMX_v3.json');
document.getElementById('importProject').onchange=async e=>{const f=e.target.files[0];if(!f)return;try{loadProject(JSON.parse(await f.text()))}catch{alert('El archivo de proyecto no es válido.')}e.target.value=''};
document.getElementById('clear').onclick=()=>{if(confirm('¿Limpiar todos los campeones colocados?')){placed.forEach(x=>x.el.remove());placed=[];selected=null;toast('Mapa limpiado')}};
function drawImg(ctx,img,x,y,w,h){return new Promise(res=>{if(img.complete&&img.naturalWidth){ctx.drawImage(img,x,y,w,h);res()}else{img.onload=()=>{ctx.drawImage(img,x,y,w,h);res()};img.onerror=res}})}
document.getElementById('export').onclick=async()=>{toast('Exportando PNG…');const canvas=document.createElement('canvas');canvas.width=997;canvas.height=1577;const ctx=canvas.getContext('2d');ctx.fillStyle='#000';ctx.fillRect(0,0,997,1577);await drawImg(ctx,document.getElementById('map'),0,0,997,1577);for(const o of placed)await drawImg(ctx,o.el.querySelector('img'),o.x,o.y,o.w,o.h);ctx.textAlign='right';ctx.font='bold 18px Arial';ctx.fillStyle='rgba(192,132,252,.85)';ctx.fillText('Alliance War Planner',975,1535);ctx.font='14px Arial';ctx.fillStyle='rgba(255,255,255,.75)';ctx.fillText('by DenjiMX · v3.0.1',975,1558);canvas.toBlob(b=>{download(b,'Alliance_War_Defense_by_DenjiMX_v3.png');toast('PNG exportado')},'image/png')};
window.addEventListener('resize',()=>{if(!placed.length)fitStage()});renderFilters();renderGallery();requestAnimationFrame(fitStage);
</script>
</body></html>
